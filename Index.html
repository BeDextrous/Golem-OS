<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --bg: #fdfcf0; --accent: #2d6a4f; --border: #e9edc9; --nav-bg: #064e3b; }
    body { background-color: var(--bg); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
    .card { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 1.5rem; transition: 0.2s; }
    .fab { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 60; cursor: pointer; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; padding: 12px 0 20px; z-index: 50; }
    .nav-bar button { color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 2px; background: none; border: none; cursor: pointer; }
    .nav-bar button.active { color: #fff; }
    .nav-bar .material-icons { font-size: 22px; }
    .sidebar { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 420px; background: #fff; z-index: 100; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; box-shadow: -4px 0 30px rgba(0,0,0,0.1); }
    .sidebar.open { transform: translateX(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.show { opacity: 1; pointer-events: all; }
    .input-field { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: #fafafa; outline: none; box-sizing: border-box; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .pill-todo { background: #fef9c3; color: #854d0e; }
    .pill-inprogress { background: #dbeafe; color: #1e40af; }
    .pill-done { background: #dcfce7; color: #166534; }
    .pill-high { background: #fee2e2; color: #991b1b; }
    .pill-medium { background: #fef9c3; color: #854d0e; }
    .pill-low { background: #f0fdf4; color: #166534; }
    .progress-bar { height: 6px; background: #e9edc9; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(to right, var(--accent), #a3b18a); border-radius: 99px; transition: width 0.8s ease; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; gap: 12px; opacity: 0.4; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-wrap.show { display: flex; }
    .modal-sheet { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 24px 24px 40px; max-height: 90vh; overflow-y: auto; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .drag-handle { cursor: grab; color: #ccc; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1c1a; --border: #2f332f; }
      body { background-color: var(--bg); }
      .card { background: rgba(36,38,36,0.8); }
      .sidebar, .modal-sheet { background: #1e201e; color: #e0e0e0; }
      .input-field { background: #2a2c2a; border-color: #3a3c3a; color: #e0e0e0; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header style="padding: 52px 20px 12px; display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <h1 style="font-size: 26px; font-weight: 800; color: var(--accent); margin: 0;" id="view-title">Dashboard</h1>
      <p style="font-size: 10px; opacity: 0.4; font-weight: 700; letter-spacing: 0.15em; margin: 2px 0 0;" id="view-subtitle">Sovereign 3.5</p>
    </div>
    <button onclick="reloadData()" style="opacity: 0.3; background: none; border: none; cursor: pointer;">
      <span class="material-icons">refresh</span>
    </button>
  </header>

  <!-- Main content -->
  <main style="padding: 8px 16px;" id="main-content">
    <div class="spinner-wrap"><div class="spinner"></div><p style="font-size:11px;letter-spacing:0.1em;">LOADING</p></div>
  </main>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div style="padding: 20px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
      <button onclick="closeSidebar()" style="background:none;border:none;cursor:pointer;"><span class="material-icons" style="color:#999;">close</span></button>
      <span style="font-size:11px;font-weight:700;letter-spacing:0.1em;opacity:0.4;" id="sidebar-view-label">CONTEXT</span>
      <button onclick="archiveItem()" style="background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;color:#ef4444;">ARCHIVE</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px;" id="sidebar-fields"></div>
    <div style="padding:16px 20px 32px;border-top:1px solid var(--border);">
      <button onclick="saveItem()" style="width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:700;cursor:pointer;">Update & Close</button>
    </div>
  </div>

  <!-- Add / Ingest Modal -->
  <div class="modal-wrap" id="add-modal">
    <div class="modal-sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:16px;font-weight:800;" id="modal-title">Add Item</span>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;"><span class="material-icons" style="color:#999;">close</span></button>
      </div>
      <div id="modal-fields" style="display:flex;flex-direction:column;gap:12px;"></div>
      <button onclick="submitAdd()" style="width:100%;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:700;cursor:pointer;">ADD</button>
    </div>
  </div>

  <!-- FAB -->
  <div class="fab" onclick="openModal()"><span class="material-icons">add</span></div>

  <!-- Nav -->
  <nav class="nav-bar">
    <button onclick="switchView('dashboard')" id="nav-dashboard" class="active"><span class="material-icons">dashboard</span>home</button>
    <button onclick="switchView('Objectives')" id="nav-Objectives"><span class="material-icons">eco</span>goals</button>
    <button onclick="switchView('Tasks')" id="nav-Tasks"><span class="material-icons">bolt</span>tasks</button>
    <button onclick="switchView('Link_Inbox')" id="nav-Link_Inbox"><span class="material-icons">link</span>links</button>
    <button onclick="switchView('Reading List')" id="nav-Reading List"><span class="material-icons">menu_book</span>reading</button>
  </nav>

  <script>
    // ─── STATE ────────────────────────────────────────────
    let STATE = {};
    let activeView = 'dashboard';
    let activeItem = null;
    let newItemData = {};

    const VIEW_FIELDS = {
      'Objectives':   ['Objective', 'Key Result', 'Progress %', 'Area', 'Notes'],
      'Tasks':        ['Task', 'Status', 'Objective', 'Area', 'Priority', 'Due Date', 'Notes'],
      'Reading List': ['Book Title', 'Author', 'Status', 'Genre', 'Rating', 'Notes'],
      'Link_Inbox':   ['Custom Title', 'URL', 'Website', 'Category', 'Status', 'Notes'],
    };

    // ─── BOOT ────────────────────────────────────────────
    window.onload = () => loadData();

    function loadData() {
      setLoading(true);
      google.script.run
        .withSuccessHandler(data => { STATE = data; setLoading(false); renderView(activeView); })
        .withFailureHandler(err => { setLoading(false); showError(err.message); })
        .getSheetData();
    }

    function reloadData() { loadData(); }
    function setLoading(on) {
      if (on) document.getElementById('main-content').innerHTML =
        '<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:11px;letter-spacing:0.1em;">LOADING</p></div>';
    }
    function showError(msg) {
      document.getElementById('main-content').innerHTML =
        `<p style="text-align:center;opacity:0.4;margin-top:60px;font-size:13px;">Error: ${msg}</p>`;
    }

    // ─── NAV ─────────────────────────────────────────────
    function switchView(view) {
      activeView = view;
      document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
      const nb = document.getElementById('nav-' + view);
      if (nb) nb.classList.add('active');
      renderView(view);
    }

    // ─── RENDER ROUTER ───────────────────────────────────
    function renderView(view) {
      document.getElementById('view-title').innerText =
        view === 'dashboard' ? 'Dashboard' : view.replace('_', ' ');
      if (view === 'dashboard') renderDashboard();
      else renderList(view);
    }

    // ─── DASHBOARD ───────────────────────────────────────
    function renderDashboard() {
      const tasks = STATE['Tasks'] || [];
      const todo = tasks.filter(t => t.Status === 'To Do' || t.Status === 'In Progress');
      const objectives = STATE['Objectives'] || [];
      const reading = STATE['Reading List'] || [];
      const currentBook = reading.find(b => b.Status === 'Reading');

      let html = '';

      // Today's tasks
      html += `<div class="section-label" style="margin-top:8px;">Today's Focus</div>`;
      if (todo.length === 0) {
        html += `<div class="card" style="padding:16px;margin-bottom:8px;opacity:0.5;font-size:13px;">All clear 🌿</div>`;
      } else {
        todo.slice(0, 5).forEach(t => {
          html += `<div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(t)}, "Tasks")'>
            <span class="material-icons" style="color:var(--accent);font-size:18px;">bolt</span>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;">${t.Task}</div>
              <div style="font-size:11px;opacity:0.4;">${t.Priority || ''} ${t.Area ? '· '+t.Area : ''}</div>
            </div>
            ${pillHtml(t.Status)}
          </div>`;
        });
      }

      // Objectives progress
      html += `<div class="section-label" style="margin-top:20px;">Objectives</div>`;
      const groups = {};
      objectives.forEach(o => { if(!groups[o.Objective]) groups[o.Objective]=[]; groups[o.Objective].push(o); });
      Object.entries(groups).slice(0,3).forEach(([g, items]) => {
        html += `<div class="card" style="padding:16px;margin-bottom:8px;">
          <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:10px;">${g}</div>`;
        items.forEach(item => {
          const p = Math.round(parseFloat(item['Progress %']) * 100) || 0;
          html += `<div style="margin-bottom:10px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(item)}, "Objectives")'>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
              <span>${item['Key Result'] || 'General'}</span><span>${p}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
          </div>`;
        });
        html += `</div>`;
      });

      // Currently reading
      if (currentBook) {
        html += `<div class="section-label" style="margin-top:20px;">Currently Reading</div>
        <div class="card" style="padding:16px;margin-bottom:8px;display:flex;gap:12px;align-items:center;cursor:pointer;" onclick='openSidebar(${JSON.stringify(currentBook)}, "Reading List")'>
          <span class="material-icons" style="color:var(--accent);">menu_book</span>
          <div>
            <div style="font-size:13px;font-weight:600;">${currentBook['Book Title']}</div>
            <div style="font-size:11px;opacity:0.5;">${currentBook.Author}</div>
          </div>
        </div>`;
      }

      document.getElementById('main-content').innerHTML = html;
    }

    // ─── LIST VIEW ───────────────────────────────────────
    function renderList(view) {
      const data = STATE[view] || [];
      const mc = document.getElementById('main-content');

      if (data.length === 0) {
        mc.innerHTML = `<p style="text-align:center;opacity:0.3;margin-top:60px;font-size:13px;">Nothing here yet.</p>`;
        return;
      }

      let html = '';

      if (view === 'Objectives') {
        const groups = {};
        data.forEach(o => { if(!groups[o.Objective]) groups[o.Objective]=[]; groups[o.Objective].push(o); });
        Object.entries(groups).forEach(([g, items]) => {
          html += `<div class="section-label" style="margin-top:16px;">${g}</div>
          <div class="card" style="padding:16px;margin-bottom:12px;">`;
          items.forEach(item => {
            const p = Math.round(parseFloat(item['Progress %']) * 100) || 0;
            html += `<div style="margin-bottom:14px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(item)}, "Objectives")'>
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
                <span style="font-weight:500;">${item['Key Result'] || 'General'}</span><span style="opacity:0.5;">${p}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
            </div>`;
          });
          html += `</div>`;
        });

      } else if (view === 'Tasks') {
        ['High','Medium','Low',''].forEach(priority => {
          const group = data.filter(t => (t.Priority || '') === priority);
          if (group.length === 0) return;
          if (priority) html += `<div class="section-label" style="margin-top:16px;">${priority} Priority</div>`;
          group.forEach(item => {
            html += `<div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(item)}, "Tasks")'>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:600;${item.Status==='Done'?'text-decoration:line-through;opacity:0.4;':''}">${item.Task}</div>
                <div style="font-size:11px;opacity:0.4;margin-top:2px;">${item.Objective||''} ${item.Area?'· '+item.Area:''}</div>
              </div>
              ${pillHtml(item.Status)}
            </div>`;
          });
        });

      } else if (view === 'Reading List') {
        ['Reading','To Read','Finished'].forEach(status => {
          const group = data.filter(b => b.Status === status);
          if (group.length === 0) return;
          html += `<div class="section-label" style="margin-top:16px;">${status}</div>`;
          group.forEach(item => {
            html += `<div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(item)}, "Reading List")'>
              <span class="material-icons" style="color:var(--accent);font-size:20px;">menu_book</span>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:600;">${item['Book Title']}</div>
                <div style="font-size:11px;opacity:0.4;">${item.Author||''} ${item.Genre?'· '+item.Genre:''}</div>
              </div>
              ${item.Rating ? `<span style="font-size:12px;opacity:0.5;">${'★'.repeat(parseInt(item.Rating))}</span>` : ''}
            </div>`;
          });
        });

      } else if (view === 'Link_Inbox') {
        ['Unread','Read','Archived'].forEach(status => {
          const group = data.filter(l => (l.Status||'Unread') === status);
          if (group.length === 0) return;
          html += `<div class="section-label" style="margin-top:16px;">${status}</div>`;
          group.forEach(item => {
            const url = item.URL && item.URL !== 'https://...' ? item.URL : null;
            html += `<div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick='openSidebar(${JSON.stringify(item)}, "Link_Inbox")'>
              <span class="material-icons" style="color:var(--accent);font-size:20px;">link</span>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:600;">${item['Custom Title']||'Untitled'}</div>
                <div style="font-size:11px;opacity:0.4;">${item.Website||''} ${item.Category?'· '+item.Category:''}</div>
              </div>
              ${url ? `<a href="${url}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent);"><span class="material-icons" style="font-size:18px;">open_in_new</span></a>` : ''}
            </div>`;
          });
        });
      }

      mc.innerHTML = html;
    }

    // ─── PILLS ───────────────────────────────────────────
    function pillHtml(val) {
      if (!val) return '';
      const map = {
        'To Do': 'pill-todo', 'In Progress': 'pill-inprogress', 'Done': 'pill-done',
        'High': 'pill-high', 'Medium': 'pill-medium', 'Low': 'pill-low'
      };
      return `<span class="pill ${map[val]||''}">${val}</span>`;
    }

    // ─── SIDEBAR ─────────────────────────────────────────
    function openSidebar(item, view) {
      activeItem = { ...item, _view: view };
      document.getElementById('sidebar-view-label').innerText = view.replace('_',' ').toUpperCase();
      const fields = document.getElementById('sidebar-fields');
      fields.innerHTML = '';
      for (let key in item) {
        if (key.startsWith('_')) continue;
        fields.innerHTML += `
          <div style="margin-bottom:16px;">
            <label style="font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.4;display:block;margin-bottom:6px;">${key.toUpperCase()}</label>
            <input class="input-field" type="text" value="${item[key] ?? ''}" onchange="activeItem['${key}']=this.value">
          </div>`;
      }
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    function saveItem() {
      const v = activeItem._view;
      const idx = STATE[v]?.findIndex(i => i._rowIndex === activeItem._rowIndex);
      if (idx > -1) STATE[v][idx] = { ...activeItem };
      google.script.run
        .withSuccessHandler(() => { closeSidebar(); renderView(v); })
        .withFailureHandler(err => alert('Save failed: ' + err.message))
        .syncAction('UPDATE', v, activeItem._rowIndex, activeItem);
    }

    function archiveItem() {
      if (!confirm('Archive this item?')) return;
      const v = activeItem._view;
      STATE[v] = STATE[v].filter(i => i._rowIndex !== activeItem._rowIndex);
      google.script.run
        .withSuccessHandler(() => { closeSidebar(); renderView(v); })
        .withFailureHandler(err => alert('Archive failed: ' + err.message))
        .syncAction('DELETE', v, activeItem._rowIndex, {});
    }

    // ─── ADD MODAL ───────────────────────────────────────
    function openModal() {
      newItemData = {};
      const view = activeView === 'dashboard' ? 'Tasks' : activeView;
      const fields = VIEW_FIELDS[view] || [];
      document.getElementById('modal-title').innerText = 'Add to ' + view.replace('_',' ');
      document.getElementById('modal-fields').innerHTML = fields.map(f => `
        <div>
          <label style="font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.5;display:block;margin-bottom:4px;">${f.toUpperCase()}</label>
          <input class="input-field" type="text" placeholder="${f}" oninput="newItemData['${f}']=this.value">
        </div>`).join('');
      document.getElementById('add-modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('add-modal').classList.remove('show');
    }

    function submitAdd() {
      const view = activeView === 'dashboard' ? 'Tasks' : activeView;
      google.script.run
        .withSuccessHandler(() => { closeModal(); loadData(); })
        .withFailureHandler(err => alert('Add failed: ' + err.message))
        .syncAction('ADD', view, -1, newItemData);
    }
  </script>
</body>
</html>

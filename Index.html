<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Space+Grotesk:wght@300;500;700&display=swap');
    
    :root { 
      --bg: #0b0f10; 
      --card-bg: rgba(25, 32, 35, 0.7);
      --accent: #10b981; 
      --text: #e2e8f0;
      --border: rgba(255, 255, 255, 0.08);
    }
    
    body { 
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, #142822 0%, #0b0f10 100%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 140px;
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    .card { 
      border-radius: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

    .fab { 
      position: fixed; bottom: 110px; right: 24px; width: 64px; height: 64px; 
      background: var(--accent); color: #000; border-radius: 18px; 
      display: flex; align-items: center; justify-content: center; 
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); z-index: 60; 
    }

    .sidebar { 
      transform: translateX(100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
      background: #0f1416; position: fixed; inset: 0; width: 100%; z-index: 300; 
    }
    .sidebar.open { transform: translateX(0); }

    .nav-bar { 
      background: rgba(11, 15, 16, 0.85); backdrop-filter: blur(20px);
      padding: 1.5rem; position: fixed; bottom: 24px; left: 24px; right: 24px; 
      border-radius: 24px; border: 1px solid var(--border);
      z-index: 100; display: flex; justify-content: space-around;
    }

    .nav-btn { color: rgba(255, 255, 255, 0.3); transition: 0.3s; }
    .nav-btn.active { color: var(--accent); text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }

    .input-flat { 
      width: 100%; padding: 16px; background: rgba(255,255,255,0.03); 
      border-radius: 14px; border: 1px solid var(--border); 
      outline: none; color: white; font-size: 15px;
    }

    .pill { 
      font-size: 10px; padding: 4px 10px; border-radius: 8px; 
      text-transform: uppercase; font-weight: 800; letter-spacing: 0.05em;
      background: rgba(16, 185, 129, 0.15); color: var(--accent); 
    }

    .area-header { 
      font-size: 11px; font-weight: 800; letter-spacing: 0.2em; 
      color: var(--accent); opacity: 0.6; margin: 32px 0 12px 12px; 
      text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;
    }

    h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  </style>
</head>
<body>
  <header class="p-8 pb-4">
    <p class="text-[10px] text-emerald-500 font-black tracking-[0.3em] uppercase mb-1">System Active</p>
    <h1 class="text-4xl text-white" id="v-title">Dashboard</h1>
  </header>

  <main id="v-content" class="p-4 space-y-6"></main>
  
  <div class="fab" onclick="openCapture()"><span class="material-icons text-3xl font-bold">add</span></div>

  <div id="capture-modal" class="modal">
    <div class="glass w-full max-w-md rounded-[32px] p-8 space-y-6">
      <div class="flex justify-between items-center"><h2 class="text-2xl font-bold text-white">Ingest</h2><button onclick="closeCapture()"><span class="material-icons text-white opacity-40">close</span></button></div>
      <select id="u-type" class="input-flat font-bold text-emerald-400" onchange="toggleCaptureFields()">
        <option value="">SELECT TYPE...</option>
        <option value="Tasks">TASK</option>
        <option value="Objectives">OBJECTIVE</option>
        <option value="Link_Inbox">LINK</option>
        <option value="Notes">NOTE</option>
      </select>
      <div id="u-fields" class="space-y-4"></div>
      <button onclick="saveUniversal()" id="ingest-btn" class="hidden w-full py-5 bg-emerald-500 text-black rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg shadow-emerald-500/20">Execute</button>
    </div>
  </div>

  <div id="sidebar" class="sidebar flex flex-col">
    <div class="p-8 flex justify-between items-center border-b border-white/5">
      <button onclick="closeSidebar()"><span class="material-icons text-white opacity-40 text-3xl">west</span></button>
      <span id="s-header-type" class="pill">Context</span>
      <div class="w-8"></div>
    </div>
    <div id="s-content" class="p-8 overflow-y-auto space-y-8 flex-grow"></div>
    <div class="p-8 bg-black/40 backdrop-blur-xl border-t border-white/5">
       <button onclick="closeSidebar()" class="w-full py-5 bg-emerald-500 text-black rounded-2xl font-bold uppercase text-xs tracking-widest">Update State</button>
    </div>
  </div>

  <nav class="nav-bar">
    <button onclick="render('Dashboard')" class="nav-btn" id="n-Dashboard"><span class="material-icons">grid_view</span></button>
    <button onclick="render('Objectives')" class="nav-btn" id="n-Objectives"><span class="material-icons">track_changes</span></button>
    <button onclick="render('Tasks')" class="nav-btn" id="n-Tasks"><span class="material-icons">bolt</span></button>
    <button onclick="render('Link_Inbox')" class="nav-btn" id="n-Link_Inbox"><span class="material-icons">auto_awesome_motion</span></button>
    <button onclick="render('Reading_List')" class="nav-btn" id="n-Reading_List"><span class="material-icons">book</span></button>
  </nav>

  <script>
    let STATE = <?!= STATE_JSON ?>;
    let currentView = 'Dashboard';
    let hideDoneTasks = true;
    let activeItem = null;

    function render(view) {
      currentView = view;
      const content = document.getElementById('v-content');
      content.innerHTML = '';
      document.getElementById('v-title').innerText = view.replace('_', ' ');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const activeNav = document.getElementById('n-'+view);
      if(activeNav) activeNav.classList.add('active');
      
      if (view === 'Dashboard') renderDashboard(content);
      else if (view === 'Objectives') renderObjectives(content);
      else if (view === 'Tasks') renderTasks(content);
      else if (view === 'Link_Inbox') renderLinks(content);
      else if (view === 'Reading_List') renderBooks(content);
    }

    function renderDashboard(content) {
      content.innerHTML = `
        <div class="grid grid-cols-2 gap-4">
          <div class="glass card p-6 cursor-pointer" onclick="render('Tasks')">
            <p class="text-3xl font-bold text-emerald-400">${STATE.Tasks.filter(t=>t.Status !== 'Done').length}</p>
            <p class="text-[9px] uppercase font-bold opacity-40 tracking-wider">Active Tasks</p>
          </div>
          <div class="glass card p-6 cursor-pointer" onclick="render('Objectives')">
            <p class="text-3xl font-bold text-emerald-400">${[...new Set(STATE.Objectives.map(o=>o.Objective))].length}</p>
            <p class="text-[9px] uppercase font-bold opacity-40 tracking-wider">Strategic Goals</p>
          </div>
        </div>
        <div class="glass card p-6 space-y-6">
          <h4 class="text-[10px] font-bold uppercase text-emerald-500 tracking-[0.2em]">Quick Ingest</h4>
          <div class="space-y-4">
            <input type="text" id="q-task" placeholder="Task description..." class="input-flat">
            <button onclick="quickSave('Tasks', 'q-task')" class="w-full bg-emerald-500 text-black py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Commit to Inbox</button>
          </div>
        </div>
      `;
    }

    function renderTasks(content) {
      const filtered = hideDoneTasks ? STATE.Tasks.filter(t => t.Status !== 'Done') : STATE.Tasks;
      content.innerHTML = `<div class="flex justify-end mb-4"><button onclick="toggleTaskFilter()" class="text-[10px] uppercase font-black opacity-30 tracking-widest">${hideDoneTasks ? 'Show Completed' : 'Hide Completed'}</button></div>`;
      const areas = {};
      filtered.forEach(t => {
        const areaName = t.Area || 'Uncategorized';
        if (!areas[areaName]) areas[areaName] = [];
        areas[areaName].push(t);
      });
      for (let area in areas) {
        const safeId = `group-${area.replace(/\s+/g, '-')}`;
        content.innerHTML += `<div class="area-header">${area}</div><div id="${safeId}" class="space-y-3 min-h-[40px]"></div>`;
        setTimeout(() => {
          const container = document.getElementById(safeId);
          areas[area].forEach(t => {
            const div = document.createElement('div');
            div.className = 'glass card p-6 flex justify-between items-center cursor-move';
            div.innerHTML = `<div><p class="font-bold text-white text-md">${t.Task || t["Task Name"] || 'Untitled'}</p><p class="text-[10px] text-emerald-500/60 font-medium">${t.Objective || ''}</p></div><span class="pill">${t.Status}</span>`;
            div.onclick = (e) => { if(!div.classList.contains('sortable-chosen')) openSidebar(t._rowIndex, 'Tasks'); };
            container.appendChild(div);
          });
          new Sortable(container, { animation: 200, ghostClass: 'opacity-10', delay: 150, delayOnTouchOnly: true });
        }, 0);
      }
    }

    function renderObjectives(content) {
      const groups = {}; STATE.Objectives.forEach(o => { if(!groups[o.Objective]) groups[o.Objective] = []; groups[o.Objective].push(o); });
      for (let name in groups) {
        let card = document.createElement('div'); card.className = 'glass card p-6 mb-4 cursor-pointer'; 
        card.onclick = () => openSidebar(groups[name][0]._rowIndex, 'Objectives');
        let krs = groups[name].map(i => { 
          let p = (parseFloat(i.Current)/parseFloat(i.Target))*100 || 0; 
          return `<div class="mt-4"><div class="flex justify-between text-[10px] mb-2 font-bold opacity-60"><span>${i["Key Result"] || 'Target'}</span><span>${Math.round(p)}%</span></div><div class="progress-bg bg-white/5"><div class="progress-fill shadow-[0_0_10px_rgba(16,185,129,0.3)]" style="width:${p}%"></div></div></div>`; 
        }).join('');
        card.innerHTML = `<p class="pill mb-2">Goal</p><h3 class="text-xl font-bold text-white">${name}</h3>${krs}`;
        content.appendChild(card);
      }
    }

    function renderLinks(content) {
      STATE.Link_Inbox.slice().reverse().forEach(l => {
        content.innerHTML += `
          <div class="glass card p-6 mb-3 flex justify-between items-center cursor-pointer" onclick="openSidebar(${l._rowIndex}, 'Link_Inbox')">
            <div class="truncate pr-4">
              <p class="text-white font-bold truncate">${l["Custom Title"] || l.URL || 'Untitled'}</p>
              <a href="${l.URL}" target="_blank" onclick="event.stopPropagation();" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-2 inline-block underline">Launch Intel</a>
            </div>
            <span class="material-icons text-emerald-500 opacity-40">arrow_forward</span>
          </div>`;
      });
    }

    function openSidebar(row, view) {
      activeItem = STATE[view].find(i => i._rowIndex === row);
      if(!activeItem) return;
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('s-header-type').innerText = view;
      let html = `<div class="space-y-6 pb-24">`;
      Object.keys(activeItem).filter(f => !f.startsWith('_')).forEach(f => {
        html += `<div class="space-y-2"><label class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${f}</label><textarea class="input-flat focus:border-emerald-500/50 transition-colors" onchange="updateValue('${f}', this.value)">${activeItem[f] || ''}</textarea></div>`;
      });
      html += `</div>`;
      document.getElementById('s-content').innerHTML = html;
    }

    function updateValue(f, v) { activeItem[f] = v; google.script.run.syncAction('UPDATE', activeItem._view, activeItem._rowIndex, activeItem); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); render(currentView); }
    function toggleTaskFilter() { hideDoneTasks = !hideDoneTasks; render('Tasks'); }
    function openCapture() { document.getElementById('capture-modal').classList.add('open'); }
    function closeCapture() { document.getElementById('capture-modal').classList.remove('open'); }
    function toggleCaptureFields() {
      const type = document.getElementById('u-type').value;
      const fieldContainer = document.getElementById('u-fields');
      const btn = document.getElementById('ingest-btn');
      fieldContainer.innerHTML = '';
      if (!type) { btn.classList.add('hidden'); return; }
      btn.classList.remove('hidden');
      const fields = type === 'Tasks' ? ['Task', 'Objective', 'Area'] : 
                     type === 'Objectives' ? ['Objective', 'Key Result', 'Target', 'Current'] : 
                     type === 'Link_Inbox' ? ['URL', 'Custom Title'] : ['Title', 'Content'];
      fields.forEach(f => {
        fieldContainer.innerHTML += `<div class="space-y-2"><label class="text-[10px] font-bold text-white/40 uppercase tracking-widest">${f}</label><input type="text" id="u-${f.replace(' ','_')}" class="input-flat"></div>`;
      });
    }
    function saveUniversal() {
      const type = document.getElementById('u-type').value;
      let data = { _rowIndex: Date.now(), _view: type, Status: 'To Do' };
      document.querySelectorAll('#u-fields input').forEach(i => data[i.id.replace('u-', '').replace('_', ' ')] = i.value);
      STATE[type].push(data);
      google.script.run.syncAction('ADD', type, null, data);
      closeCapture();
      render(currentView);
    }
    function quickSave(target, inputId) {
      const val = document.getElementById(inputId).value; if(!val) return;
      let data = { _rowIndex: Date.now(), Status: 'To Do', Area: 'INBOX', _view: target };
      if(target === 'Tasks') data.Task = val;
      STATE[target].push(data);
      google.script.run.syncAction('ADD', target, null, data);
      document.getElementById(inputId).value = '';
      render(currentView);
    }
    window.onload = () => render('Dashboard');
  </script>
</body>
</html>

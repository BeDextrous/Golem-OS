<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --bg: #fdfcf0; --accent: #2d6a4f; --border: #e9edc9; --nav-bg: #064e3b; }
    body { background-color: var(--bg); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
    .card { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 1.5rem; transition: 0.2s; }
    .fab { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 60; cursor: pointer; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(6, 78, 59, 0.8); backdrop-filter: blur(5px); z-index: 400; align-items: center; justify-content: center; padding: 20px; }
    .modal.open { display: flex; }
    .sidebar { transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: white; position: fixed; inset: 0; width: 100%; height: 100%; z-index: 300; display: flex; flex-direction: column; }
    .sidebar.open { transform: translateX(0); }
    .nav-bar { background: var(--nav-bg); padding: 1.25rem; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-around; }
    .nav-btn { color: rgba(236, 253, 245, 0.5); border: none; background: none; outline: none; }
    .nav-btn.active { color: #6ee7b7; transform: scale(1.1); }
    .input-flat { width: 100%; padding: 14px; background: #f8f9fa; border-radius: 12px; border: 1px solid #eee; outline: none; font-size: 14px; box-sizing: border-box; }
    .pill { font-size: 9px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; font-weight: 900; background: #e9edc9; color: #2d6a4f; }
    .progress-bg { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); }
    .area-header { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; color: #064e3b; opacity: 0.4; margin-top: 24px; margin-bottom: 8px; margin-left: 8px; text-transform: uppercase; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; gap: 12px; opacity: 0.4; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="p-8 pb-4 flex justify-between items-end">
    <div>
      <h1 class="text-3xl font-serif italic text-emerald-900" id="v-title">Dashboard</h1>
      <p class="text-[10px] opacity-40 uppercase font-black tracking-widest">Sovereign 3.6 · Live</p>
    </div>
    <button onclick="loadData()" style="background:none;border:none;cursor:pointer;opacity:0.3;"><span class="material-icons">refresh</span></button>
  </header>

  <main id="v-content" class="p-4 space-y-6">
    <div class="spinner-wrap"><div class="spinner"></div><p style="font-size:11px;letter-spacing:0.1em;">LOADING</p></div>
  </main>

  <div class="fab" onclick="openCapture()"><span class="material-icons text-3xl">add</span></div>

  <!-- Universal Ingest Modal -->
  <div id="capture-modal" class="modal">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-serif italic font-bold text-emerald-900">Universal Ingest</h2>
        <button onclick="closeCapture()"><span class="material-icons opacity-20">close</span></button>
      </div>
      <select id="u-type" class="input-flat font-bold text-emerald-800" onchange="toggleCaptureFields()">
        <option value="">SELECT TYPE...</option>
        <option value="Tasks">TASK</option>
        <option value="Objectives">OBJECTIVE</option>
        <option value="Link_Inbox">LINK</option>
        <option value="Reading List">BOOK</option>
      </select>
      <div id="u-fields" class="space-y-4"></div>
      <button onclick="saveUniversal()" id="ingest-btn" class="hidden w-full py-4 bg-emerald-900 text-white rounded-2xl font-bold uppercase tracking-widest text-xs">Commit to OS</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <div class="p-6 border-b flex justify-between items-center">
      <button onclick="closeSidebar()"><span class="material-icons opacity-30 text-3xl">close</span></button>
      <span id="s-header-type" class="pill">Context</span>
      <div class="w-8"></div>
    </div>
    <div id="s-content" class="p-6 overflow-y-auto space-y-6 flex-grow"></div>
    <div class="p-6 bg-gray-50 border-t space-y-3">
      <button onclick="saveAndClose()" class="w-full py-5 bg-emerald-900 text-white rounded-2xl font-bold uppercase text-xs tracking-widest">Update & Close</button>
      <button onclick="archiveItem()" class="w-full py-3 text-rose-500 text-xs font-bold uppercase tracking-widest">Archive</button>
    </div>
  </div>

  <nav class="nav-bar">
    <button onclick="render('Dashboard')" class="nav-btn active" id="n-Dashboard"><span class="material-icons">dashboard</span></button>
    <button onclick="render('Objectives')" class="nav-btn" id="n-Objectives"><span class="material-icons">eco</span></button>
    <button onclick="render('Tasks')" class="nav-btn" id="n-Tasks"><span class="material-icons">bolt</span></button>
    <button onclick="render('Link_Inbox')" class="nav-btn" id="n-Link_Inbox"><span class="material-icons">link</span></button>
    <button onclick="render('Reading List')" class="nav-btn" id="n-Reading List"><span class="material-icons">menu_book</span></button>
  </nav>

  <script>
    let STATE = { Objectives: [], Tasks: [], 'Reading List': [], Link_Inbox: [] };
    let currentView = 'Dashboard';
    let hideDoneTasks = true;
    let activeItem = null;

    // ─── BOOT ─────────────────────────────────────────────
    window.onload = () => loadData();

    function loadData() {
      document.getElementById('v-content').innerHTML =
        '<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:11px;letter-spacing:0.1em;">LOADING</p></div>';
      google.script.run
        .withSuccessHandler(data => { STATE = data; render(currentView); })
        .withFailureHandler(err => {
          document.getElementById('v-content').innerHTML =
            `<p style="text-align:center;opacity:0.4;margin-top:60px;">Error: ${err.message}</p>`;
        })
        .getSheetData();
    }

    // ─── RENDER ROUTER ────────────────────────────────────
    function render(view) {
      currentView = view;
      const content = document.getElementById('v-content');
      content.innerHTML = '';
      document.getElementById('v-title').innerText = view.replace('_', ' ');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const nb = document.getElementById('n-' + view);
      if (nb) nb.classList.add('active');

      if (view === 'Dashboard') renderDashboard(content);
      else if (view === 'Objectives') renderObjectives(content);
      else if (view === 'Tasks') renderTasks(content);
      else if (view === 'Link_Inbox') renderLinks(content);
      else if (view === 'Reading List') renderBooks(content);
    }

    // ─── DASHBOARD ────────────────────────────────────────
    function renderDashboard(content) {
      const tasks = STATE.Tasks || [];
      const objectives = STATE.Objectives || [];
      const reading = (STATE['Reading List'] || []).find(b => b.Status === 'Reading') || { 'Book Title': 'None Active' };

      content.innerHTML = `
        <div class="grid grid-cols-2 gap-4">
          <div class="card p-5 text-center cursor-pointer" onclick="render('Tasks')">
            <p class="text-2xl font-black text-emerald-800">${tasks.filter(t => t.Status !== 'Done').length}</p>
            <p class="text-[8px] uppercase font-bold opacity-40">Tasks Open</p>
          </div>
          <div class="card p-5 text-center cursor-pointer" onclick="render('Objectives')">
            <p class="text-2xl font-black text-emerald-800">${[...new Set(objectives.map(o => o.Objective))].length}</p>
            <p class="text-[8px] uppercase font-bold opacity-40">Active Goals</p>
          </div>
        </div>
        <div class="card p-5 flex justify-between items-center cursor-pointer" onclick="render('Reading List')">
          <div>
            <p class="text-[9px] font-black opacity-30 uppercase">Current Reading</p>
            <p class="text-xs font-bold">${reading['Book Title']}</p>
          </div>
          <span class="material-icons text-emerald-800">auto_stories</span>
        </div>
        <div class="card p-5 space-y-4">
          <h4 class="text-[10px] font-black uppercase text-emerald-800 tracking-widest opacity-40">Command Center</h4>
          <div class="space-y-3">
            <input type="text" id="q-task" placeholder="Quick Task..." class="input-flat">
            <button onclick="quickSave('Tasks','q-task')" class="w-full bg-emerald-900 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-tighter">Commit Task</button>
          </div>
          <div class="grid grid-cols-2 gap-3 pt-2">
            <div class="space-y-2">
              <input type="text" id="q-link" placeholder="URL..." class="input-flat text-[11px]">
              <button onclick="quickSave('Link_Inbox','q-link')" class="w-full bg-slate-200 text-slate-800 py-2 rounded-lg text-[9px] font-bold uppercase">Collect Link</button>
            </div>
            <div class="space-y-2">
              <input type="text" id="q-book" placeholder="Book title..." class="input-flat text-[11px]">
              <button onclick="quickSave('Reading List','q-book')" class="w-full bg-emerald-100 text-emerald-900 py-2 rounded-lg text-[9px] font-bold uppercase">Add Book</button>
            </div>
          </div>
        </div>`;
    }

    // ─── TASKS ────────────────────────────────────────────
    function renderTasks(content) {
      const filtered = hideDoneTasks
        ? (STATE.Tasks || []).filter(t => t.Status !== 'Done')
        : (STATE.Tasks || []);

      content.innerHTML = `<div class="flex justify-end mb-4">
        <button onclick="toggleTaskFilter()" class="text-[10px] uppercase font-black opacity-40">
          ${hideDoneTasks ? 'Show Done' : 'Hide Done'}
        </button></div>`;

      const areas = {};
      filtered.forEach(t => {
        const a = t.Area || 'Uncategorized';
        if (!areas[a]) areas[a] = [];
        areas[a].push(t);
      });

      for (let area in areas) {
        const safeId = `group-${area.replace(/\s+/g, '-')}`;
        content.innerHTML += `<div class="area-header">${area}</div><div id="${safeId}" class="space-y-2 min-h-[40px]"></div>`;
        setTimeout(() => {
          const container = document.getElementById(safeId);
          if (!container) return;
          areas[area].forEach(t => {
            const div = document.createElement('div');
            div.className = 'card p-5 flex justify-between items-center cursor-pointer';
            div.innerHTML = `<div><p class="font-bold text-sm">${t.Task || 'Untitled'}</p><p class="text-[9px] text-emerald-700 italic">${t.Objective || ''}</p></div><span class="pill">${t.Status || ''}</span>`;
            div.onclick = () => { if (!div.classList.contains('sortable-chosen')) openSidebar(t._rowIndex, 'Tasks'); };
            container.appendChild(div);
          });
          new Sortable(container, { animation: 150, ghostClass: 'opacity-20', delay: 150, delayOnTouchOnly: true });
        }, 0);
      }
    }

    // ─── OBJECTIVES ───────────────────────────────────────
    function renderObjectives(content) {
      const groups = {};
      (STATE.Objectives || []).forEach(o => {
        if (!groups[o.Objective]) groups[o.Objective] = [];
        groups[o.Objective].push(o);
      });
      for (let name in groups) {
        const card = document.createElement('div');
        card.className = 'card p-6 mb-4 cursor-pointer';
        card.onclick = () => openSidebar(groups[name][0]._rowIndex, 'Objectives');
        const krs = groups[name].map(i => {
          const p = Math.round(parseFloat(i['Progress %']) * 100) || 0;
          return `<div class="mt-3">
            <div class="flex justify-between text-[10px] mb-1"><span>${i['Key Result'] || 'Target'}</span><span>${p}%</span></div>
            <div class="progress-bg"><div class="progress-fill" style="width:${p}%"></div></div>
          </div>`;
        }).join('');
        card.innerHTML = `<p class="pill mb-1">${groups[name][0].Area || 'General'}</p>
          <h3 class="text-xl font-serif font-bold italic">${name}</h3>${krs}`;
        content.appendChild(card);
      }
    }

    // ─── LINKS ────────────────────────────────────────────
    function renderLinks(content) {
      (STATE.Link_Inbox || []).slice().reverse().forEach(l => {
        const url = l.URL && l.URL !== 'https://...' ? l.URL : null;
        content.innerHTML += `<div class="card p-5 mb-2 flex justify-between items-center cursor-pointer" onclick="openSidebar(${l._rowIndex}, 'Link_Inbox')">
          <div style="flex:1;min-width:0;">
            <p class="text-sm font-bold truncate">${l['Custom Title'] || l.URL || 'Untitled Link'}</p>
            <p class="text-[9px] opacity-40">${l.Website || ''} ${l.Category ? '· ' + l.Category : ''}</p>
          </div>
          ${url ? `<a href="${url}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent);margin-left:8px;"><span class="material-icons" style="font-size:18px;">open_in_new</span></a>` : ''}
        </div>`;
      });
    }

    // ─── BOOKS ────────────────────────────────────────────
    function renderBooks(content) {
      ['Reading', 'To Read', 'Finished'].forEach(status => {
        const group = (STATE['Reading List'] || []).filter(b => b.Status === status);
        if (!group.length) return;
        content.innerHTML += `<div class="area-header">${status}</div>`;
        group.forEach(b => {
          content.innerHTML += `<div class="card p-5 mb-2 flex justify-between items-center cursor-pointer" onclick="openSidebar(${b._rowIndex}, 'Reading List')">
            <div><p class="font-bold text-sm">${b['Book Title'] || 'Untitled'}</p><p class="text-[10px] opacity-40">${b.Author || ''}</p></div>
            <span class="pill">${b.Status}</span>
          </div>`;
        });
      });
    }

    // ─── SIDEBAR ─────────────────────────────────────────
    function openSidebar(rowIndex, view) {
      activeItem = (STATE[view] || []).find(i => i._rowIndex === rowIndex);
      if (!activeItem) return;
      activeItem._view = view;
      document.getElementById('s-header-type').innerText = view.replace('_', ' ');
      let html = '';
      Object.keys(activeItem).filter(f => !f.startsWith('_')).forEach(f => {
        html += `<div class="space-y-1">
          <label class="text-[9px] font-black opacity-30 uppercase">${f}</label>
          <textarea class="input-flat" rows="1" onchange="activeItem['${f}']=this.value">${activeItem[f] ?? ''}</textarea>
        </div>`;
      });
      document.getElementById('s-content').innerHTML = html;
      document.getElementById('sidebar').classList.add('open');
    }

    function saveAndClose() {
      if (!activeItem) return closeSidebar();
      const v = activeItem._view;
      const idx = (STATE[v] || []).findIndex(i => i._rowIndex === activeItem._rowIndex);
      if (idx > -1) STATE[v][idx] = { ...activeItem };
      google.script.run
        .withSuccessHandler(() => { closeSidebar(); render(currentView); })
        .withFailureHandler(err => alert('Save failed: ' + err.message))
        .syncAction('UPDATE', v, activeItem._rowIndex, activeItem);
    }

    function archiveItem() {
      if (!activeItem || !confirm('Archive this item?')) return;
      const v = activeItem._view;
      STATE[v] = (STATE[v] || []).filter(i => i._rowIndex !== activeItem._rowIndex);
      google.script.run
        .withSuccessHandler(() => { closeSidebar(); render(currentView); })
        .withFailureHandler(err => alert('Archive failed: ' + err.message))
        .syncAction('DELETE', v, activeItem._rowIndex, {});
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    // ─── UNIVERSAL INGEST ─────────────────────────────────
    function toggleCaptureFields() {
      const type = document.getElementById('u-type').value;
      const fc = document.getElementById('u-fields');
      const btn = document.getElementById('ingest-btn');
      fc.innerHTML = '';
      if (!type) { btn.classList.add('hidden'); return; }
      btn.classList.remove('hidden');

      const fieldMap = {
        'Tasks':        ['Task', 'Objective', 'Area', 'Priority'],
        'Objectives':   ['Objective', 'Key Result', 'Progress %', 'Area'],
        'Link_Inbox':   ['URL', 'Custom Title', 'Website', 'Category'],
        'Reading List': ['Book Title', 'Author', 'Status', 'Genre'],
      };
      (fieldMap[type] || []).forEach(f => {
        fc.innerHTML += `<div class="space-y-1">
          <label class="text-[9px] font-black opacity-30 uppercase">${f}</label>
          <input type="text" id="u-${f.replace(/\s/g,'_')}" class="input-flat" placeholder="${f}...">
        </div>`;
      });
    }

    function saveUniversal() {
      const type = document.getElementById('u-type').value;
      if (!type) return;
      const data = { Status: 'To Do' };
      document.querySelectorAll('#u-fields input').forEach(inp => {
        const key = inp.id.replace('u-', '').replace(/_/g, ' ');
        data[key] = inp.value;
      });
      google.script.run
        .withSuccessHandler(() => { closeCapture(); loadData(); })
        .withFailureHandler(err => alert('Save failed: ' + err.message))
        .syncAction('ADD', type, -1, data);
    }

    function quickSave(target, inputId) {
      const val = document.getElementById(inputId).value.trim();
      if (!val) return;
      const data = { Status: 'To Do', Area: 'INBOX' };
      if (target === 'Tasks') data.Task = val;
      else if (target === 'Link_Inbox') { data.URL = val; data['Custom Title'] = val; }
      else if (target === 'Reading List') { data['Book Title'] = val; data.Status = 'To Read'; }
      google.script.run
        .withSuccessHandler(() => { document.getElementById(inputId).value = ''; loadData(); })
        .withFailureHandler(err => alert('Failed: ' + err.message))
        .syncAction('ADD', target, -1, data);
    }

    function openCapture() { document.getElementById('capture-modal').classList.add('open'); }
    function closeCapture() {
      document.getElementById('capture-modal').classList.remove('open');
      document.getElementById('u-type').value = '';
      document.getElementById('u-fields').innerHTML = '';
      document.getElementById('ingest-btn').classList.add('hidden');
    }

    function toggleTaskFilter() { hideDoneTasks = !hideDoneTasks; render('Tasks'); }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
    :root { --bg: #0b0f10; --accent: #10b981; --border: rgba(255, 255, 255, 0.08); }
    body { background: var(--bg); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; padding-bottom: 120px; }
    .glass { background: rgba(25, 32, 35, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); }
    .sidebar { transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: #0f1416; position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; }
    .sidebar.open { transform: translateX(0); }
    .nav-bar { background: rgba(11, 15, 16, 0.9); backdrop-filter: blur(20px); position: fixed; bottom: 20px; left: 15px; right: 15px; border-radius: 28px; border: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-around; padding: 12px; }
    .nav-btn { color: rgba(255, 255, 255, 0.2); }
    .nav-btn.active { color: var(--accent); }
    .input-flat { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); color: white; margin-top: 4px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; resize: vertical; }
    .input-flat:focus { outline: none; border-color: var(--accent); }
    .group-label { font-size: 10px; font-weight: 900; color: var(--accent); opacity: 0.5; margin: 20px 0 10px 0; letter-spacing: 0.1em; text-transform: uppercase; }
    .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .loading-overlay.fade { opacity: 0; pointer-events: none; }
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 600; display: flex; align-items: flex-end; justify-content: center; padding: 20px; }
    .confirm-overlay.hidden { display: none; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .pill-active { background: rgba(16,185,129,0.15); color: #10b981; }
    .pill-done { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
    .pill-paused { background: rgba(234,179,8,0.15); color: #eab308; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-emerald-500"></div>
  </div>

  <!-- Delete confirmation sheet -->
  <div id="confirm-overlay" class="confirm-overlay hidden">
    <div class="glass rounded-3xl p-6 w-full max-w-sm space-y-4">
      <p class="font-bold text-white text-center">Delete this item?</p>
      <p class="text-xs text-center opacity-40">This cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="cancelDelete()" class="flex-1 py-3 rounded-2xl border border-white/10 text-sm font-bold text-white/60">Cancel</button>
        <button onclick="confirmDelete()" class="flex-1 py-3 rounded-2xl bg-red-500/90 text-white font-bold text-sm">Delete</button>
      </div>
    </div>
  </div>

  <header class="p-6 flex justify-between items-center">
    <button onclick="toggleMenu()" class="glass p-3 rounded-2xl">
      <span class="material-icons text-emerald-500">widgets</span>
    </button>
    <h1 class="text-xl font-bold" id="v-title">Dashboard</h1>
    <button onclick="location.reload()" class="glass p-3 rounded-2xl">
      <span class="material-icons text-emerald-500">sync</span>
    </button>
  </header>

  <main id="v-content" class="p-4 space-y-4"></main>

  <nav class="nav-bar">
    <button onclick="render('Dashboard')" class="nav-btn" id="n-Dashboard"><span class="material-icons text-3xl">grid_view</span></button>
    <button onclick="render('Goals')" class="nav-btn" id="n-Goals"><span class="material-icons text-3xl">track_changes</span></button>
    <button onclick="render('Tasks')" class="nav-btn" id="n-Tasks"><span class="material-icons text-3xl">bolt</span></button>
    <button onclick="render('Finances')" class="nav-btn" id="n-Finances"><span class="material-icons text-3xl">payments</span></button>
    <button onclick="render('Notes')" class="nav-btn" id="n-Notes"><span class="material-icons text-3xl">description</span></button>
  </nav>

  <div id="sidebar" class="sidebar">
    <div class="p-6 flex justify-between items-center border-b border-white/5">
      <button onclick="closeSidebar()"><span class="material-icons text-white/60">close</span></button>
      <span id="s-header-type" class="text-[10px] font-black uppercase tracking-widest text-emerald-500">Editor</span>
      <button onclick="deleteCurrentItem()" class="text-red-400 opacity-60 hover:opacity-100">
        <span class="material-icons text-xl">delete</span>
      </button>
    </div>
    <div id="s-content" class="p-6 overflow-y-auto space-y-4 flex-grow"></div>
    <div class="p-6 bg-black/20 border-t border-white/5">
      <button onclick="saveChanges()" class="w-full py-4 bg-emerald-500 text-black rounded-2xl font-bold uppercase text-xs tracking-widest">Save Changes</button>
    </div>
  </div>

  <script>
    // ─── STATE ────────────────────────────────────────────────────────────────
    let STATE = <?!= STATE_JSON ?>;
    let activeItem = { index: null, view: null, isNew: false };
    let activeView = 'Dashboard';

    // ─── SCHEMAS (ID column always excluded from forms) ───────────────────────
    const SCHEMA = {
      Tasks:      ["Task Name", "Status", "Due Date", "Objective", "Area", "Priority"],
      Goals:      ["Title", "Area", "Status", "Notes"],
      Objectives: ["GoalID", "Title", "Target_Value", "Current_Value", "Metric_Unit", "Deadline"],
      Reading:    ["Book Title", "Author", "Status", "Progress_Pct"],
      Notes:      ["Title", "Content", "Tags", "ParentID"],
      Links:      ["Title", "URL", "Website", "Date Added", "ParentID"],
      Finances:   ["Date", "Label", "Category", "Amount"],
      CRM:        ["Name", "Role", "Company", "Interaction_Log"]
    };

    // Field display hints: which fields get a larger textarea
    const TALL_FIELDS = new Set(["Content", "Interaction_Log", "Notes"]);

    // ─── ROUTING ─────────────────────────────────────────────────────────────
    function render(view) {
      activeView = view;
      const content = document.getElementById('v-content');
      content.innerHTML = '';
      document.getElementById('v-title').innerText = view;
      document.querySelectorAll('.nav-btn').forEach(btn =>
        btn.classList.toggle('active', btn.id === `n-${view}`)
      );

      if (view === 'Dashboard') {
        renderDashboard(content);
        return;
      }

      const singular = view.replace(/s$/, '');
      content.innerHTML = `
        <button onclick="openSidebar(null, '${view}', true)"
          class="w-full glass p-4 rounded-2xl border-dashed border-white/20 text-emerald-500 font-bold mb-4 text-sm tracking-wide">
          + ADD NEW ${singular.toUpperCase()}
        </button>`;

      const data = STATE[view] || [];

      if (view === 'Tasks' || view === 'Goals') {
        const groups = [...new Set(data.map(item => item.Area || 'Unassigned'))].sort();
        groups.forEach(group => {
          content.innerHTML += `<div class="group-label">${group}</div>`;
          data.filter(i => (i.Area || 'Unassigned') === group)
              .forEach(item => {
                content.innerHTML += createCard(item, view, data.indexOf(item));
              });
        });
      } else if (view === 'Objectives') {
        // Group by linked Goal
        const goals = STATE['Goals'] || [];
        const goalMap = {};
        goals.forEach(g => { goalMap[g.ID] = g.Title; });
        const groups = [...new Set(data.map(item => item.GoalID || 'Unlinked'))];
        groups.forEach(gid => {
          const label = goalMap[gid] || (gid === 'Unlinked' ? 'Unlinked' : `Goal ${gid}`);
          content.innerHTML += `<div class="group-label">${label}</div>`;
          data.filter(i => (i.GoalID || 'Unlinked') === gid)
              .forEach(item => {
                content.innerHTML += createCard(item, view, data.indexOf(item));
              });
        });
      } else {
        data.forEach((item, i) => content.innerHTML += createCard(item, view, i));
      }
    }

    // ─── CARD ─────────────────────────────────────────────────────────────────
    function createCard(item, view, index) {
      // Pick the right title field per module
      const titleField = {
        Tasks: "Task Name", Goals: "Title", Objectives: "Title",
        Reading: "Book Title", Notes: "Title", Links: "Title",
        Finances: "Label", CRM: "Name"
      }[view] || "Title";

      const title = item[titleField] || 'Untitled';

      // Build a meaningful subtitle per module
      let sub = '';
      if (view === 'Tasks')      sub = [item.Area, item.Priority, item.Status].filter(Boolean).join(' · ');
      else if (view === 'Goals') sub = [item.Area, item.Status].filter(Boolean).join(' · ');
      else if (view === 'Objectives') sub = item.Deadline ? `Due ${item.Deadline}` : '';
      else if (view === 'Reading')    sub = [item.Author, item.Status, item.Progress_Pct ? item.Progress_Pct + '%' : ''].filter(Boolean).join(' · ');
      else if (view === 'Notes')      sub = item.Tags || '';
      else if (view === 'Links')      sub = item.Website || item.URL || '';
      else if (view === 'Finances')   sub = [item.Date, item.Category, item.Amount ? '$' + item.Amount : ''].filter(Boolean).join(' · ');
      else if (view === 'CRM')        sub = [item.Role, item.Company].filter(Boolean).join(' · ');

      // Status pill coloring
      const statusPill = item.Status ? `<span class="status-pill ${pillClass(item.Status)}">${item.Status}</span>` : '';

      return `
        <div onclick="openSidebar(${index}, '${view}')"
          class="glass p-5 rounded-2xl mb-2 flex justify-between items-center cursor-pointer">
          <div class="flex-1 min-w-0 pr-3">
            <p class="font-bold text-white truncate">${title}</p>
            <p class="text-[10px] opacity-40 uppercase mt-0.5 truncate">${sub}</p>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            ${statusPill}
            <span class="material-icons opacity-20 text-xl">chevron_right</span>
          </div>
        </div>`;
    }

    function pillClass(status) {
      const s = (status || '').toLowerCase();
      if (['done', 'complete', 'completed', 'read'].includes(s)) return 'pill-done';
      if (['paused', 'on hold', 'blocked'].includes(s)) return 'pill-paused';
      return 'pill-active';
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────
    function renderDashboard(content) {
      const modules = [
        { key: 'Tasks',      icon: 'bolt',         label: 'Tasks' },
        { key: 'Goals',      icon: 'track_changes', label: 'Goals' },
        { key: 'Objectives', icon: 'flag',          label: 'Objectives' },
        { key: 'Finances',   icon: 'payments',      label: 'Finances' },
        { key: 'Notes',      icon: 'description',   label: 'Notes' },
        { key: 'Links',      icon: 'link',          label: 'Links' },
        { key: 'Reading',    icon: 'menu_book',     label: 'Reading' },
        { key: 'CRM',        icon: 'people',        label: 'CRM' },
      ];

      content.innerHTML = `<div class="grid grid-cols-2 gap-3">` +
        modules.map(m => `
          <div class="glass p-6 rounded-3xl cursor-pointer" onclick="render('${m.key}')">
            <div class="flex items-center justify-between mb-3">
              <span class="material-icons text-emerald-500 text-xl">${m.icon}</span>
            </div>
            <p class="text-3xl font-black text-white">${STATE[m.key] ? STATE[m.key].length : 0}</p>
            <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mt-1">${m.label}</p>
          </div>`).join('') +
        `</div>`;
    }

    // ─── SIDEBAR ──────────────────────────────────────────────────────────────
    function openSidebar(index, view, isNew = false) {
      activeItem = { index, view, isNew };
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('s-header-type').innerText = isNew ? `New ${view}` : `Edit ${view}`;

      const fields = SCHEMA[view] || [];
      const item = isNew ? {} : (STATE[view] || [])[index] || {};

      let html = '';
      fields.forEach(f => {
        const isTall = TALL_FIELDS.has(f);
        html += `
          <div>
            <label class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">${f}</label>
            <textarea id="field-${f}" class="input-flat" rows="${isTall ? 5 : 2}">${escapeHtml(item[f] || '')}</textarea>
          </div>`;
      });

      // Show read-only ID if editing
      if (!isNew && item.ID) {
        html = `<div class="text-[10px] opacity-30 font-mono">ID: ${item.ID}</div>` + html;
      }

      document.getElementById('s-content').innerHTML = html;
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    // ─── SAVE ─────────────────────────────────────────────────────────────────
    function saveChanges() {
      const payload = {};
      const fields = SCHEMA[activeItem.view] || [];
      fields.forEach(f => {
        const el = document.getElementById(`field-${f}`);
        if (el) payload[f] = el.value;
      });

      showLoader();
      const item = activeItem.isNew ? null : (STATE[activeItem.view] || [])[activeItem.index];
      const rowIndex = item ? item._rowIndex : null;

      google.script.run
        .withSuccessHandler(newState => {
          STATE = newState;
          render(activeView);
          closeSidebar();
          hideLoader();
        })
        .withFailureHandler(err => {
          hideLoader();
          alert('Save failed: ' + err.message);
        })
        .syncItem(activeItem.view, rowIndex, payload);
    }

    // ─── DELETE ───────────────────────────────────────────────────────────────
    function deleteCurrentItem() {
      if (activeItem.isNew) { closeSidebar(); return; }
      document.getElementById('confirm-overlay').classList.remove('hidden');
    }

    function cancelDelete() {
      document.getElementById('confirm-overlay').classList.add('hidden');
    }

    function confirmDelete() {
      cancelDelete();
      const item = (STATE[activeItem.view] || [])[activeItem.index];
      if (!item || !item._rowIndex) { closeSidebar(); return; }

      showLoader();
      google.script.run
        .withSuccessHandler(newState => {
          STATE = newState;
          render(activeView);
          closeSidebar();
          hideLoader();
        })
        .withFailureHandler(err => {
          hideLoader();
          alert('Delete failed: ' + err.message);
        })
        .deleteItem(activeItem.view, item._rowIndex);
    }

    // ─── UTILS ────────────────────────────────────────────────────────────────
    function showLoader() { document.getElementById('loader').classList.remove('fade'); }
    function hideLoader() { document.getElementById('loader').classList.add('fade'); }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toggleMenu() {
      // Reserved for future menu/settings panel
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.onload = () => {
      hideLoader();
      render('Dashboard');
    };
  </script>
</body>
</html>

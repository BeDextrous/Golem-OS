    async function loadCalendar() {
      const container = document.getElementById('cal-events');
      if (!container) return;
      const token = window.__providerToken;
      if (!token) {
        container.innerHTML = `<p class="text-[10px] text-white/30 italic">Calendar access requires re-signing in. Sign out and back in once to grant access.</p>`;
        return;
      }
      try {
        const now = new Date();
        // Start from tomorrow midnight so Today section handles the current day
        const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1); tomorrow.setHours(0, 0, 0, 0);
        const later = new Date(tomorrow.getTime() + 6 * 864e5);
        const params = new URLSearchParams({
          timeMin: tomorrow.toISOString(),
          timeMax: later.toISOString(),
          singleEvents: 'true',
          orderBy: 'startTime',
          maxResults: '10'
        });
        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (!res.ok) throw new Error(`Calendar API ${res.status}`);
        const json = await res.json();
        const items = json.items || [];
        if (!items.length) {
          container.innerHTML = `<p class="text-[10px] text-white/30 italic">No upcoming events</p>`;
          return;
        }
        container.innerHTML = items.slice(0, 5).map(e => {
          const startRaw = e.start?.dateTime || e.start?.date;
          const endRaw   = e.end?.dateTime   || e.end?.date;
          const isAllDay = !!e.start?.date;
          const d = new Date(startRaw);
          const day   = d.toLocaleDateString(undefined, { weekday: 'short' }).toUpperCase();
          const date  = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
          const time  = isAllDay ? 'All Day' :
            d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
          const endTime = endRaw && !isAllDay
            ? ' — ' + new Date(endRaw).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })
            : '';
          return `
            <div class="flex gap-4 items-center">
              <div class="flex-shrink-0 w-12 text-center">
                <p class="text-[8px] font-black text-emerald-500 uppercase">${day}</p>
                <p class="text-xs font-bold text-white">${escapeHtml(date)}</p>
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-xs font-bold text-white truncate">${escapeHtml(e.summary || '(no title)')}</p>
                <p class="text-[9px] opacity-30 font-bold">${escapeHtml(time + endTime)}</p>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        console.error('Calendar load failed:', err);
        container.innerHTML = `<p class="text-[10px] text-white/30 italic">Calendar unavailable.</p>`;
      }
    }

    // ─── DEADLINES THIS WEEK ─────────────────────────────────────────────────
    function renderDeadlinesSection() {
      const tasks = STATE['Tasks'] || [];
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const weekEnd = new Date(today); weekEnd.setDate(today.getDate() + 7);

      // Parse YYYY-MM-DD safely in local time (avoid UTC shift)
      function parseLocalDate(str) {
        if (!str) return null;
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      function dueDateLabel(d) {
        const diff = Math.round((d - today) / 864e5);
        if (diff < 0)  return { text: 'Overdue', cls: 'text-red-400' };
        if (diff === 0) return { text: 'Today',   cls: 'text-amber-400' };
        if (diff === 1) return { text: 'Tomorrow', cls: 'text-amber-300' };
        return {
          text: d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }),
          cls: 'text-white/50'
        };
      }

      const relevant = tasks
        .filter(t => {
          if (!t['Due Date']) return false;
          const status = (t.Status || '').toLowerCase();
          if (status === 'done') return false;
          const d = parseLocalDate(t['Due Date']);
          if (!d) return false;
          return d <= weekEnd; // include overdue + up to 7 days out
        })
        .sort((a, b) => parseLocalDate(a['Due Date']) - parseLocalDate(b['Due Date']));

      const PRIORITY_CLS = {
        'high':   'bg-red-500/20 text-red-400',
        'medium': 'bg-amber-500/20 text-amber-400',
        'low':    'bg-white/10 text-white/40',
      };

      const STATUS_CLS = {
        'active':  'bg-emerald-500/20 text-emerald-400',
        'to do':   'bg-white/10 text-white/40',
        'on hold': 'bg-amber-500/20 text-amber-400',
      };

      let inner = '';
      if (!relevant.length) {
        inner = `<p class="text-[10px] text-white/30 italic">No deadlines this week</p>`;
      } else {
        inner = relevant.map(t => {
          const d     = parseLocalDate(t['Due Date']);
          const label = dueDateLabel(d);
          const name  = escapeHtml(t['Task Name'] || '(unnamed)');
          const pri   = (t.Priority || '').toLowerCase();
          const stat  = (t.Status   || '').toLowerCase();
          const priCls  = PRIORITY_CLS[pri]  || '';
          const statCls = STATUS_CLS[stat]   || 'bg-white/10 text-white/40';
          const priTag  = pri  ? `<span class="text-[8px] px-1.5 py-0.5 rounded font-bold ${priCls}">${escapeHtml(t.Priority)}</span>` : '';
          const statTag = stat ? `<span class="text-[8px] px-1.5 py-0.5 rounded font-bold ${statCls}">${escapeHtml(t.Status)}</span>` : '';

          return `
            <div class="flex items-start gap-3 cursor-pointer" onclick="navigate('Tasks')">
              <div class="flex-shrink-0 text-right w-16">
                <p class="text-[9px] font-black uppercase ${label.cls}">${label.text}</p>
              </div>
              <div class="min-w-0 flex-1 border-l border-white/10 pl-3">
                <p class="text-xs font-bold text-white truncate">${name}</p>
                ${priTag || statTag ? `<div class="flex gap-1 mt-1">${priTag}${statTag}</div>` : ''}
              </div>
            </div>`;
        }).join('');
      }

      return `
        <div class="glass p-6 rounded-[32px] space-y-3">
          <div class="flex justify-between items-center">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500">Deadlines This Week</h3>
            <span class="material-icons text-white/20 text-sm">flag</span>
          </div>
          <div class="space-y-3">${inner}</div>
        </div>`;
    }

    // ─── TODAY CALENDAR ──────────────────────────────────────────────────────
    function fmtTime(dt) {
      const d = new Date(dt);
      let h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      return m === 0 ? `${h}${ap}` : `${h}:${String(m).padStart(2, '0')}${ap}`;
    }

    function renderTodayEvent(event, now) {
      const isAllDay = !event.start?.dateTime;
      const start    = isAllDay ? null : new Date(event.start.dateTime);
      const end      = isAllDay ? null : new Date(event.end?.dateTime);
      const isPast   = !isAllDay && end < now;
      const isNow    = !isAllDay && start <= now && end >= now;

      const borderColor = isNow  ? 'border-emerald-500'
                        : isPast ? 'border-white/10'
                        :          'border-white/20';
      const opacity     = isPast ? 'opacity-40' : '';
      const titleColor  = isNow  ? 'text-emerald-400' : 'text-white';
      const timeStr     = isAllDay ? 'All day'
                        : `${fmtTime(start)}${end ? ' – ' + fmtTime(end) : ''}`;

      const nowBadge  = isNow && !isAllDay
        ? `<span class="text-[8px] bg-emerald-500/20 text-emerald-400 px-1.5 py-0.5 rounded font-bold">● Now</span>`
        : '';
      const meetBadge = event.conferenceUrl
        ? `<a href="${escapeHtml(event.conferenceUrl)}" target="_blank"
              class="text-[8px] bg-emerald-500/15 text-emerald-400 px-1.5 py-0.5 rounded font-bold">Meet</a>`
        : '';

      return `
        <div class="border-l-2 ${borderColor} ${opacity} pl-3">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0 flex-1">
              <p class="text-xs font-bold ${titleColor} truncate">${escapeHtml(event.summary || '(no title)')}</p>
              <p class="text-[9px] text-white/30 font-bold">${escapeHtml(timeStr)}</p>
            </div>
            ${nowBadge || meetBadge ? `<div class="flex gap-1 flex-shrink-0">${nowBadge}${meetBadge}</div>` : ''}
          </div>
        </div>`;
    }

    async function loadTodayCalendar() {
      const container = document.getElementById('cal-today');
      if (!container) return;
      const token = window.__providerToken;
      if (!token) {
        container.innerHTML = `<p class="text-[10px] text-white/30 italic">Calendar access requires re-signing in.</p>`;
        return;
      }
      const now = new Date();
      const dateEl = document.getElementById('cal-today-date');
      if (dateEl) dateEl.textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

      try {
        const todayStart = new Date(now); todayStart.setHours(0, 0, 0, 0);
        const todayEnd   = new Date(now); todayEnd.setHours(23, 59, 59, 999);
        const params = new URLSearchParams({
          timeMin:       todayStart.toISOString(),
          timeMax:       todayEnd.toISOString(),
          singleEvents:  'true',
          orderBy:       'startTime',
          maxResults:    '20'
        });
        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (!res.ok) throw new Error(`Calendar API ${res.status}`);
        const json = await res.json();
        const items = json.items || [];

        if (!items.length) {
          container.innerHTML = `<p class="text-[10px] text-white/30 italic">No events today</p>`;
          return;
        }

        const allDay = items.filter(e =>  e.start?.date && !e.start?.dateTime);
        const timed  = items.filter(e => !e.start?.date ||  e.start?.dateTime)
                            .sort((a, b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));

        let html = '';
        let nowInserted = false;

        allDay.forEach(e => { html += renderTodayEvent(e, now); });

        timed.forEach(e => {
          const start = new Date(e.start.dateTime);
          if (!nowInserted && start > now) {
            nowInserted = true;
            html += `
              <div class="flex items-center gap-2 py-0.5">
                <div class="w-1.5 h-1.5 rounded-full bg-red-500 flex-shrink-0"></div>
                <div class="flex-1 h-px bg-red-500/40"></div>
                <span class="text-[9px] text-red-400 font-bold flex-shrink-0">${fmtTime(now)}</span>
              </div>`;
          }
          html += renderTodayEvent(e, now);
        });

        if (!nowInserted) {
          html += `
            <div class="flex items-center gap-2 py-0.5">
              <div class="w-1.5 h-1.5 rounded-full bg-red-500 flex-shrink-0"></div>
              <div class="flex-1 h-px bg-red-500/40"></div>
              <span class="text-[9px] text-red-400 font-bold flex-shrink-0">${fmtTime(now)}</span>
            </div>`;
        }

        container.innerHTML = html;
      } catch (err) {
        console.error('Today calendar load failed:', err);
        container.innerHTML = `<p class="text-[10px] text-white/30 italic">Calendar unavailable.</p>`;
      }
    }

    // ─── FIELD RENDERING ─────────────────────────────────────────────────────
    const FIELD_LABEL = (f) =>
      `<label class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">${escapeHtml(f)}</label>`;

    function renderField(view, f, rawValue) {
      const value = rawValue == null ? '' : String(rawValue);
      // Tasks: Objective options are grouped by Goal (and filtered when Goal changes)
      if (view === 'Tasks' && f === 'Objective') {
        const html = buildObjectiveOptionsHtml(value, null);
        return `<div>${FIELD_LABEL(f)}<select id="field-${f}" class="input-flat">${html}</select></div>`;
      }
      if (LINK_FIELDS[f])         return renderLinkField(view, f, value, LINK_FIELDS[f]);
      if (ENUM_FIELDS[f]) {
        const cfg = ENUM_FIELDS[f];
        const opts = Array.isArray(cfg) ? cfg : (cfg[view] || null);
        if (opts) return renderEnumField(f, value, opts);
      }
      if (DYNAMIC_ENUM_FIELDS[f]) {
        const cfg = DYNAMIC_ENUM_FIELDS[f];
        const opts = collectDynamicOptions(f, cfg.views);
        return renderEnumField(f, value, opts, true);
      }
      const isTall = TALL_FIELDS.has(f);
      return `
        <div>
          ${FIELD_LABEL(f)}
          <textarea id="field-${f}" class="input-flat" rows="${isTall ? 5 : 2}">${escapeHtml(value)}</textarea>
        </div>`;
    }

    function renderLinkField(view, f, value, cfg) {
      const multi = cfg.sources.length > 1;
      let options = `<option value="">— None —</option>`;
      let matched = false;
      cfg.sources.forEach(src => {
        const rows = STATE[src] || [];
        if (!rows.length) return;
        const labelKey = cfg.labels[src];
        const sorted = [...rows].sort((a, b) =>
          String(a[labelKey] || '').localeCompare(String(b[labelKey] || '')));
        const optHtml = sorted.map(row => {
          const id = row.ID || row._id;
          const storeVal = multi ? `${src}:${id}` : String(id);
          const label = row[labelKey] || `(untitled ${src} ${id})`;
          const selected = String(storeVal) === String(value);
          if (selected) matched = true;
          return `<option value="${escapeHtml(storeVal)}" ${selected ? 'selected' : ''}>${escapeHtml(label)}</option>`;
        }).join('');
        options += multi ? `<optgroup label="${src}">${optHtml}</optgroup>` : optHtml;
      });
      if (value && !matched) {
        options += `<option value="${escapeHtml(value)}" selected>⚠ ${escapeHtml(value)} (legacy)</option>`;
      }
      return `
        <div>
          ${FIELD_LABEL(f)}
          <select id="field-${f}" class="input-flat">${options}</select>
        </div>`;
    }

    function renderEnumField(f, value, opts, allowAdd = false) {
      let optHtml = `<option value="">— None —</option>`;
      let matched = false;
      opts.forEach(o => {
        const selected = String(o).toLowerCase() === String(value).toLowerCase();
        if (selected) matched = true;
        optHtml += `<option value="${escapeHtml(o)}" ${selected ? 'selected' : ''}>${escapeHtml(o)}</option>`;
      });
      if (value && !matched) {
        optHtml += `<option value="${escapeHtml(value)}" selected>${escapeHtml(value)}</option>`;
      }
      if (allowAdd) optHtml += `<option value="__ADD_NEW__">+ Add new…</option>`;
      const onChange = allowAdd ? `onchange="handleAddNewOption(this, '${f}')"` : '';
      return `
        <div>
          ${FIELD_LABEL(f)}
          <select id="field-${f}" class="input-flat" ${onChange}>${optHtml}</select>
        </div>`;
    }

    function collectDynamicOptions(field, views) {
      const set = new Set();
      views.forEach(v => {
        (STATE[v] || []).forEach(row => {
          const val = row[field];
          if (val && String(val).trim()) set.add(String(val).trim());
        });
      });
      return [...set].sort((a, b) => a.localeCompare(b));
    }

    function handleAddNewOption(selectEl, field) {
      if (selectEl.value !== '__ADD_NEW__') return;
      const newVal = window.prompt(`New ${field}:`);
      if (!newVal) { selectEl.value = ''; return; }
      const opt = document.createElement('option');
      opt.value = newVal; opt.textContent = newVal; opt.selected = true;
      selectEl.insertBefore(opt, selectEl.querySelector('option[value="__ADD_NEW__"]'));
      selectEl.value = newVal;
    }

    function resolveLinkLabel(field, value) {
      const cfg = LINK_FIELDS[field];
      if (!cfg || !value) return value || '';
      const str = String(value);
      let src, id;
      if (cfg.sources.length > 1 && str.includes(':')) [src, id] = str.split(':');
      else { src = cfg.sources[0]; id = str; }
      const rows = STATE[src] || [];
      const labelKey = cfg.labels[src];
      const hit = rows.find(r => String(r.ID) === String(id));
      if (hit && hit[labelKey])
        return cfg.sources.length > 1 ? `${src.replace(/s$/, '')}: ${hit[labelKey]}` : hit[labelKey];
      return str;
    }

    // Map a Task's Objective → the owning Goal's title (for tile sub-lines, etc.)
    function resolveTaskGoalTitle(item) {
      if (!item || !item.Objective) return '';
      const o = (STATE.Objectives || []).find(x => String(x.ID) === String(item.Objective));
      if (!o || !o.GoalID) return '';
      const g = (STATE.Goals || []).find(x => String(x.ID) === String(o.GoalID));
      return g ? (g.Title || '') : '';
    }

    // Build Objective <option>s, optionally filtered to one Goal, optgroup'd by Goal otherwise.
    function buildObjectiveOptionsHtml(selectedId, filterGoalId) {
      const goals = STATE.Goals || [];
      const goalTitle = Object.fromEntries(goals.map(g => [String(g.ID), g.Title || '']));
      const all = STATE.Objectives || [];
      const items = filterGoalId
        ? all.filter(o => String(o.GoalID) === String(filterGoalId))
        : all;

      let html = `<option value="">— None —</option>`;

      if (filterGoalId) {
        [...items]
          .sort((a, b) => String(a.Title || '').localeCompare(String(b.Title || '')))
          .forEach(o => {
            const sel = String(o.ID) === String(selectedId) ? 'selected' : '';
            html += `<option value="${escapeHtml(String(o.ID))}" data-goal="${escapeHtml(String(o.GoalID || ''))}" ${sel}>${escapeHtml(o.Title || '')}</option>`;
          });
      } else {
        const buckets = new Map();
        items.forEach(o => {
          const k = String(o.GoalID || '');
          if (!buckets.has(k)) buckets.set(k, []);
          buckets.get(k).push(o);
        });
        const keys = [...buckets.keys()].sort((a, b) =>
          (goalTitle[a] || 'Unlinked').localeCompare(goalTitle[b] || 'Unlinked'));
        keys.forEach(k => {
          const list = buckets.get(k).sort((a, b) =>
            String(a.Title || '').localeCompare(String(b.Title || '')));
          const label = goalTitle[k] || (k ? `Goal ${k}` : 'Unlinked');
          let inner = '';
          list.forEach(o => {
            const sel = String(o.ID) === String(selectedId) ? 'selected' : '';
            inner += `<option value="${escapeHtml(String(o.ID))}" data-goal="${escapeHtml(String(o.GoalID || ''))}" ${sel}>${escapeHtml(o.Title || '')}</option>`;
          });
          html += `<optgroup label="${escapeHtml(label)}">${inner}</optgroup>`;
        });
      }

      // Preserve legacy/unknown selection
      if (selectedId && !items.find(o => String(o.ID) === String(selectedId))) {
        html += `<option value="${escapeHtml(String(selectedId))}" selected>⚠ ${escapeHtml(String(selectedId))} (legacy)</option>`;
      }
      return html;
    }

    // Wire Task editor: picking Objective auto-fills Goal; picking Goal filters Objectives.
    function wireTaskCrossField() {
      const obj  = document.getElementById('field-Objective');
      const goal = document.getElementById('field-Goal');
      if (!obj || !goal) return;
      obj.addEventListener('change', () => {
        if (!obj.value) return;
        const o = (STATE.Objectives || []).find(x => String(x.ID) === String(obj.value));
        if (o && o.GoalID) goal.value = String(o.GoalID);
      });
      goal.addEventListener('change', () => {
        const gid = goal.value;
        // Preserve current Objective only if it belongs to the new Goal
        let keepObj = obj.value;
        if (gid && keepObj) {
          const o = (STATE.Objectives || []).find(x => String(x.ID) === String(keepObj));
          if (!o || String(o.GoalID) !== String(gid)) keepObj = '';
        }
        obj.innerHTML = buildObjectiveOptionsHtml(keepObj, gid || null);
      });
    }

    // ─── JOB URL AUTO-FILL ───────────────────────────────────────────────────
    // When a URL is pasted into the Job URL field, attempt to extract role and
    // company from the URL structure and fill empty fields automatically.
    function titleCase(slug) {
      return (slug || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function parseJobUrl(raw) {
      const out = { role: '', company: '' };
      try {
        const u    = new URL(raw.trim());
        const host = u.hostname.toLowerCase();
        const path = u.pathname;

        if (host.includes('linkedin.com')) {
          // /jobs/view/senior-engineer-at-acme-corp-3942857362/
          const m = path.match(/\/jobs\/view\/([^/?#]+)/);
          if (m) {
            const slug   = m[1].replace(/-\d+$/, ''); // strip trailing numeric ID
            const atIdx  = slug.indexOf('-at-');
            if (atIdx > 0) {
              out.role    = titleCase(slug.slice(0, atIdx));
              out.company = titleCase(slug.slice(atIdx + 4));
            } else {
              out.role = titleCase(slug);
            }
          }
        } else if (host.includes('lever.co')) {
          // jobs.lever.co/company-name/uuid
          const parts = path.split('/').filter(Boolean);
          if (parts[0]) out.company = titleCase(parts[0]);
        } else if (host.includes('greenhouse.io')) {
          // boards.greenhouse.io/company/jobs/id  OR  greenhouse.io/company/...
          const parts = path.split('/').filter(Boolean);
          const co = parts[0] === 'jobs' ? parts[1] : parts[0];
          if (co) out.company = titleCase(co);
        } else if (host.includes('myworkdayjobs.com')) {
          // acme.wd5.myworkdayjobs.com/...
          out.company = titleCase(host.split('.')[0]);
        } else if (host.includes('ashbyhq.com')) {
          // jobs.ashbyhq.com/company-name/job-id
          const parts = path.split('/').filter(Boolean);
          if (parts[0]) out.company = titleCase(parts[0]);
        }
      } catch (_) {}
      return out;
    }

    function wireJobAppFields() {
      const urlEl = document.getElementById('field-Job URL');
      if (!urlEl) return;
      const tryFill = () => {
        const url = urlEl.value.trim();
        if (!url.startsWith('http')) return;
        const parsed = parseJobUrl(url);
        if (!parsed.role && !parsed.company) return;
        const roleEl    = document.getElementById('field-Role');
        const companyEl = document.getElementById('field-Company');
        if (parsed.role    && roleEl    && !roleEl.value.trim())    roleEl.value    = parsed.role;
        if (parsed.company && companyEl && !companyEl.value.trim()) companyEl.value = parsed.company;
      };
      urlEl.addEventListener('paste',  () => setTimeout(tryFill, 0));
      urlEl.addEventListener('change', tryFill);
    }

    // ─── STATUS FILTERS (per view, persisted in localStorage) ──────────────
    // Items whose Status matches a value in the active set are shown.
    // Default hides the "completed" status so Done items disappear automatically.
    const COMPLETED_STATUS = { Tasks: 'Done', Goals: 'Done', Reading: 'Read', JobApplications: 'Rejected' };

    function getActiveStatuses(view) {
      const all = ENUM_FIELDS.Status?.[view];
      if (!all) return null;
      const raw = localStorage.getItem(`golem:filter:${view}`);
      if (raw == null) {
        const completed = COMPLETED_STATUS[view];
        return all.filter(s => s !== completed);
      }
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return all.slice();
        // Normalize any legacy status labels stored from previous versions, then dedupe.
        const migrated = parsed.map(s => migrateStatus(view, s));
        return [...new Set(migrated)];
      } catch { return all.slice(); }
    }
    function setActiveStatuses(view, statuses) {
      localStorage.setItem(`golem:filter:${view}`, JSON.stringify(statuses));
    }
    function toggleStatusFilter(view, status) {
      const current = getActiveStatuses(view) || [];
      const idx = current.findIndex(s => String(s).toLowerCase() === String(status).toLowerCase());
      if (idx >= 0) current.splice(idx, 1);
      else current.push(status);
      setActiveStatuses(view, current);
      render(view);
    }
    function renderFilterBar(view) {
      const all = ENUM_FIELDS.Status?.[view];
      if (!all) return '';
      const active = getActiveStatuses(view) || [];
      const isOn = s => active.some(a => String(a).toLowerCase() === String(s).toLowerCase());
      let html = `<div class="flex flex-wrap gap-2 mb-4 items-center">`;
      html += `<span class="text-[10px] font-bold uppercase tracking-widest opacity-30 mr-1">Show:</span>`;
      all.forEach(s => {
        const on = isOn(s);
        const cls = on ? 'pill-active' : 'pill-done';
        html += `<button onclick="toggleStatusFilter('${view}', ${JSON.stringify(s).replace(/"/g, '&quot;')})"
          class="status-pill ${cls} cursor-pointer transition-opacity hover:opacity-100 ${on ? '' : 'opacity-40'}">
          ${escapeHtml(s)}
        </button>`;
      });
      html += `</div>`;
      return html;
    }
    function applyStatusFilter(view, data) {
      const all = ENUM_FIELDS.Status?.[view];
      if (!all) return data;
      const active = getActiveStatuses(view) || [];
      return data.filter(item => {
        if (!item.Status) return true; // items without a status always show
        return active.some(s => String(s).toLowerCase() === String(item.Status).toLowerCase());
      });
    }

    // ─── TILE ORDER (drag-to-reorder, persisted per view) ───────────────────
    function getOrder(view) {
      try { return JSON.parse(localStorage.getItem(`golem:order:${view}`) || '[]') || []; }
      catch { return []; }
    }
    function setOrder(view, ids) {
      localStorage.setItem(`golem:order:${view}`, JSON.stringify(ids.map(String)));
    }
    function sortByOrder(items, view) {
      const order = getOrder(view);
      if (!order.length) return items;
      const rank = new Map(order.map((id, i) => [String(id), i]));
      return [...items].sort((a, b) => {
        const ra = rank.has(String(a.ID)) ? rank.get(String(a.ID)) : Infinity;
        const rb = rank.has(String(b.ID)) ? rank.get(String(b.ID)) : Infinity;
        if (ra === rb) return 0;
        return ra - rb;
      });
    }

    // Wire SortableJS to every drag zone; handles mouse + touch (long-press on mobile).
    let __sortables = [];
    function wireDragAndDrop() {
      // Destroy previous instances to avoid leaks on re-render
      __sortables.forEach(s => { try { s.destroy(); } catch {} });
      __sortables = [];
      if (typeof Sortable === 'undefined') return;
      document.querySelectorAll('[data-dragzone]').forEach(zone => {
        __sortables.push(Sortable.create(zone, {
          animation: 150,
          delay: 180,
          delayOnTouchOnly: true,
          ghostClass: 'drag-ghost',
          dragClass: 'drag-active',
          group: { name: 'golem', pull: false, put: false }, // only reorder within group
          onEnd: () => persistOrderFromDom()
        }));
      });
    }
    function persistOrderFromDom() {
      const view = activeView;
      const ids = [...document.querySelectorAll('[data-drag-card]')]
        .map(el => el.getAttribute('data-id'))
        .filter(Boolean);
      if (ids.length) setOrder(view, ids);
    }

    // ─── SIDEBAR (EDITOR) ────────────────────────────────────────────────────
    function openSidebar(idOrIndex, view, isNew = false) {
      // idOrIndex: may be a string ID (preferred), a numeric index (legacy), or null for new
      let index = null;
      if (!isNew && idOrIndex != null && idOrIndex !== '') {
        const items = STATE[view] || [];
        index = items.findIndex(x => String(x.ID) === String(idOrIndex));
        if (index < 0) {
          const n = parseInt(idOrIndex, 10);
          if (!isNaN(n) && n >= 0 && n < items.length) index = n;
          else index = null;
        }
      }
      activeItem = { index, view, isNew };
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('s-header-type').innerText = isNew ? `New ${view}` : `Edit ${view}`;
      const fields = SCHEMA[view] || [];
      const baseItem = (!isNew && index != null) ? (STATE[view] || [])[index] || {} : {};
      const item = { ...baseItem };
      // Derive Goal for Tasks from Objective → GoalID
      if (view === 'Tasks' && item.Objective && !item.Goal) {
        const o = (STATE.Objectives || []).find(x => String(x.ID) === String(item.Objective));
        if (o && o.GoalID) item.Goal = String(o.GoalID);
      }
      let html = '';
      fields.forEach(f => { html += renderField(view, f, item[f]); });
      if (!isNew && item.ID) html = `<div class="text-[10px] opacity-30 font-mono">ID: ${item.ID}</div>` + html;
      document.getElementById('s-content').innerHTML = html;
      if (view === 'Tasks')           wireTaskCrossField();
      if (view === 'JobApplications') wireJobAppFields();
    }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    // ─── SAVE ────────────────────────────────────────────────────────────────
    async function saveChanges() {
      const payload = {};
      const fields = SCHEMA[activeItem.view] || [];
      fields.forEach(f => {
        const el = document.getElementById(`field-${f}`);
        if (!el) return;
        let v = el.value;
        if (v === '__ADD_NEW__') v = '';
        payload[f] = v;
      });
      showLoader();
      try {
        const current = (STATE[activeItem.view] || [])[activeItem.index];
        const id = activeItem.isNew ? null : (current ? current._id : null);
        await window.__golem.upsertRow(activeItem.view, id, payload);

        // Quick-add popup: show success and close rather than re-rendering.
        const isQuickAdd = new URLSearchParams(window.location.search).get('quick') === 'job'
          || sessionStorage.getItem('golem:pending_params');
        if (isQuickAdd && window.opener && activeItem.view === 'JobApplications') {
          closeSidebar();
          document.getElementById('v-content').innerHTML = `
            <div class="flex flex-col items-center justify-center gap-5" style="height:60vh">
              <span class="material-icons text-emerald-500" style="font-size:64px">check_circle</span>
              <p class="font-black text-white text-lg">Application saved!</p>
              <p class="text-white/30 text-sm">Closing…</p>
            </div>`;
          hideLoader();
          setTimeout(() => window.close(), 1600);
          return;
        }

        STATE = await window.__golem.loadAll();
        render(activeView);
        closeSidebar();
      } catch (err) {
        console.error(err);
        alert('Save failed: ' + (err.message || err));
      } finally {
        hideLoader();
      }
    }

    // ─── DELETE ──────────────────────────────────────────────────────────────
    function deleteCurrentItem() {
      if (activeItem.isNew) { closeSidebar(); return; }
      document.getElementById('confirm-overlay').classList.remove('hidden');
    }
    function cancelDelete() { document.getElementById('confirm-overlay').classList.add('hidden'); }
    async function confirmDelete() {
      cancelDelete();
      const item = (STATE[activeItem.view] || [])[activeItem.index];
      if (!item || !item._id) { closeSidebar(); return; }
      showLoader();
      try {
        await window.__golem.deleteRow(activeItem.view, item._id);
        STATE = await window.__golem.loadAll();
        render(activeView);
        closeSidebar();
      } catch (err) {
        console.error(err);
        alert('Delete failed: ' + (err.message || err));
      } finally {
        hideLoader();
      }
    }

    // ─── UTILS & NAVIGATION ──────────────────────────────────────────────────
    function showLoader() { document.getElementById('loader').classList.remove('fade'); }
    function hideLoader() { document.getElementById('loader').classList.add('fade'); }
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function viewSupportsKanban(view) {
      // Kanban needs a Status enum to form columns. Currently: Tasks only.
      return view === 'Tasks';
    }
    function nextMode(view, mode) {
      if (viewSupportsKanban(view)) {
        if (mode === 'card')   return 'table';
        if (mode === 'table')  return 'kanban';
        return 'card'; // from kanban
      }
      return mode === 'card' ? 'table' : 'card';
    }
    function nextModeIcon(view, mode) {
      // Icon represents the mode we'll switch TO on click.
      const next = nextMode(view, mode);
      if (next === 'table')  return 'table_view';
      if (next === 'kanban') return 'view_kanban';
      return 'view_agenda'; // next === 'card'
    }
    function toggleDisplayMode() {
      if (activeView === 'Dashboard') return;
      displayMode = nextMode(activeView, displayMode);
      render(activeView);
    }
    function toggleMenu() { document.getElementById('nav-drawer').classList.add('open'); }
    function closeMenu()  { document.getElementById('nav-drawer').classList.remove('open'); }
    function navigate(view) { closeMenu(); render(view); }

    // Expose UI handlers referenced by inline onclicks.
    Object.assign(window, {
      openSidebar, closeSidebar, saveChanges, deleteCurrentItem, confirmDelete, cancelDelete,
      toggleDisplayMode, toggleMenu, closeMenu, navigate, handleAddNewOption,
      toggleStatusFilter, quickAddKanban,
      setCareerTab, openCareerResource
    });
  </script>
</body>
